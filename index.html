<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureScan AI</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f172a, #05070d);
  font-family: system-ui, Arial;
  color: #e5e7eb;
}

/* MAIN APP */
.app {
  width: min(900px, 92vw);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 22px;
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER */
h2 {
  margin: 0 0 10px;
}

/* SCAN BOX */
textarea {
  width: 100%;
  height: 90px;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.35);
  color: white;
  outline: none;
  resize: none;
}

/* BUTTONS */
button {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 500;
  font-size: 13px;
}

button:hover {
  opacity: 0.9;
}

/* RESULT CARD */
.card {
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
}

/* AI CHAT */
.ai {
  margin-top: 14px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
}

#chat {
  height: 200px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0,0,0,0.25);
  border-radius: 10px;
  margin-bottom: 10px;
}

/* INPUT ROW */
.row {
  display: flex;
  gap: 8px;
}

.row input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  color: white;
  outline: none;
}

/* smaller send button */
.row button {
  padding: 8px 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="app">

<h2>SecureScan AI 🔐</h2>

<textarea id="input" placeholder="Paste suspicious link or message..."></textarea>
<button onclick="scan()">Scan</button>

<div id="out"></div>

<!-- AI -->
<div class="ai">
  <h3>Gemini AI Assistant</h3>

  <div id="chat"></div>

  <div class="row">
    <input id="msg" placeholder="Ask about scams..." />
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>

let lastReport = "";

/* LOCAL SCAN (frontend only) */
function scan() {
  const text = document.getElementById("input").value;

  let risk = 0;
  let issues = [];

  if (text.includes("free")) {
    risk += 20;
    issues.push("Scam keyword detected");
  }

  if (text.includes("nitro")) {
    risk += 30;
    issues.push("Fake reward scam");
  }

  if (/[а-яА-Я]/.test(text)) {
    risk += 40;
    issues.push("Unicode spoofing detected");
  }

  let level = risk < 30 ? "LOW" : risk < 70 ? "MEDIUM" : "HIGH";

  lastReport = `Risk: ${risk}/100 | Level: ${level} | Issues: ${issues.join(", ")}`;

  document.getElementById("out").innerHTML = `
    <div class="card">
      <b>Scan Result</b><br><br>
      ${lastReport}
    </div>
  `;
}

/* 🤖 GEMINI CHAT (THROUGH YOUR BACKEND) */
async function send() {
  const msg = document.getElementById("msg").value;
  const chat = document.getElementById("chat");

  if (!msg) return;

  chat.innerHTML += `<div><b>You:</b> ${msg}</div>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: msg,
      context: lastReport
    })
  });

  const data = await res.json();

  chat.innerHTML += `<div><b>AI:</b> ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
